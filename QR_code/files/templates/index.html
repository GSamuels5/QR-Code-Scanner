<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QREazy — QR Code Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink:    #0d0d0d;
    --paper:  #f5f0e8;
    --accent: #ff4d1c;
    --muted:  #b0a898;
    --card:   #fff;
    --border: #e0d8cc;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── noise texture overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── header ── */
  header {
    position: relative; z-index: 1;
    padding: 40px 48px 20px;
    display: flex; align-items: baseline; gap: 12px;
    border-bottom: 2px solid var(--ink);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: clamp(2rem, 5vw, 3.4rem);
    letter-spacing: -0.04em; line-height: 1;
  }
  header h1 span { color: var(--accent); }
  header p {
    font-size: 0.75rem; color: var(--muted);
    border-left: 2px solid var(--muted); padding-left: 12px;
  }

  /* ── layout ── */
  main {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 48px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  @media (max-width: 720px) { main { grid-template-columns: 1fr; } }

  /* ── card ── */
  .card {
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: var(--radius);
    padding: 32px;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 6px 6px 0 var(--ink); }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 8px;
  }
  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.45rem; font-weight: 700;
    margin-bottom: 24px; line-height: 1.2;
  }

  /* ── tabs ── */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 28px;
    border-bottom: 2px solid var(--border);
  }
  .tab {
    padding: 8px 18px; font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.05em;
    background: none; border: none; cursor: pointer; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all .15s;
  }
  .tab.active { color: var(--ink); border-bottom-color: var(--ink); }

  /* ── form elements ── */
  label { font-size: 0.72rem; color: var(--muted); display: block; margin-bottom: 6px; }
  textarea, input[type="text"], input[type="url"] {
    width: 100%; padding: 12px 14px;
    border: 2px solid var(--border); border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    background: var(--paper); color: var(--ink);
    resize: vertical; transition: border-color .15s;
    outline: none;
  }
  textarea:focus, input:focus { border-color: var(--ink); }

  /* ── drop zone ── */
  .dropzone {
    border: 2.5px dashed var(--border); border-radius: 12px;
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: all .2s; background: var(--paper);
  }
  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent); background: #fff5f2;
  }
  .dropzone input { display: none; }
  .dropzone .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .dropzone p { font-size: 0.8rem; color: var(--muted); }
  .dropzone p strong { color: var(--ink); }
  .dropzone .preview {
    max-width: 100%; max-height: 140px; border-radius: 8px;
    margin-top: 14px; object-fit: contain; display: none;
  }

  /* ── colour row ── */
  .color-row {
    display: flex; gap: 16px; margin-top: 18px; align-items: flex-end;
  }
  .color-field { flex: 1; }
  .color-field label { margin-bottom: 6px; }
  .color-field input[type="color"] {
    width: 100%; height: 42px; border: 2px solid var(--border);
    border-radius: 10px; padding: 3px; cursor: pointer;
    background: var(--paper);
  }

  /* ── button ── */
  .btn {
    margin-top: 22px; width: 100%;
    padding: 14px; font-family: 'Syne', sans-serif;
    font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--ink); border-radius: 12px;
    cursor: pointer; transition: all .15s;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* ── output card ── */
  #output-card {
    grid-column: 1 / -1;
    display: none; align-items: center; gap: 40px;
    flex-wrap: wrap;
  }
  #output-card.show { display: flex; }

  .qr-wrap {
    flex-shrink: 0;
    border: 2px solid var(--ink); border-radius: var(--radius);
    padding: 16px; background: #fff;
    box-shadow: 6px 6px 0 var(--ink);
  }
  #qr-img { width: 220px; height: 220px; display: block; }

  .qr-meta { flex: 1; min-width: 240px; }
  .qr-meta h3 {
    font-family: 'Syne', sans-serif; font-size: 1.2rem;
    font-weight: 700; margin-bottom: 12px;
  }
  .encoded-url {
    background: var(--paper); border: 2px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    font-size: 0.75rem; word-break: break-all; color: var(--muted);
    margin-bottom: 18px;
  }
  .encoded-url span { color: var(--ink); font-weight: 500; }

  .density-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #e6faf0; border: 1.5px solid #4caf82;
    color: #1a6b45; border-radius: 99px;
    padding: 4px 12px; font-size: 0.72rem; font-weight: 500;
    margin-bottom: 18px;
  }

  .btn-download {
    display: inline-block;
    padding: 10px 24px; font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 700; letter-spacing: 0.06em;
    background: var(--accent); color: #fff;
    border: 2px solid var(--accent); border-radius: 10px;
    cursor: pointer; text-decoration: none; transition: all .15s;
  }
  .btn-download:hover { background: #d63d10; border-color: #d63d10; }

  /* ── loader ── */
  .spinner {
    width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── error ── */
  .error-msg {
    background: #fff0ee; border: 2px solid var(--accent);
    border-radius: 10px; padding: 12px 16px;
    font-size: 0.8rem; color: var(--accent); margin-top: 14px; display: none;
  }

  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>QR<span>Eazy</span></h1>
  <p>Text · URLs · Images<br/>Free QR Generator</p>
</header>

<main>

  <!-- ── Input card ── -->
  <div class="card" style="grid-column:1/-1">
    <div class="card-label">Generator</div>
    <h2>What do you want to encode?</h2>

    <div class="tabs">
      <button class="tab active" data-tab="text">Text / URL</button>
      <button class="tab"        data-tab="image">Image</button>
    </div>

    <!-- Text panel -->
    <div class="panel active" id="panel-text">
      <label>Enter any text, URL, phone number, email…</label>
      <textarea id="text-input" rows="4" placeholder="https://example.com
OR
Hello World!
OR
tel:+27123456789"></textarea>
    </div>

    <!-- Image panel -->
    <div class="panel" id="panel-image">
      <label>Upload an image — it gets hosted and its URL is encoded into the QR</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="file-input" accept="image/*"/>
        <div class="icon">🖼️</div>
        <p><strong>Drop image here</strong> or click to browse</p>
        <p style="margin-top:4px">PNG · JPG · WEBP · GIF</p>
        <img class="preview" id="img-preview" src="" alt="preview"/>
      </div>
    </div>

    <!-- Colour pickers (shared) -->
    <div class="color-row">
      <div class="color-field">
        <label>QR Foreground</label>
        <input type="color" id="fg-color" value="#000000"/>
      </div>
      <div class="color-field">
        <label>QR Background</label>
        <input type="color" id="bg-color" value="#ffffff"/>
      </div>
    </div>

    <button class="btn" id="gen-btn">Generate QR Code</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- ── Output card ── -->
  <div class="card" id="output-card">
    <div class="qr-wrap">
      <img id="qr-img" src="" alt="QR Code"/>
    </div>
    <div class="qr-meta">
      <h3>✅ QR Code Ready</h3>
      <div class="encoded-url">
        <span id="encoded-display"></span>
      </div>
      <div class="density-badge">
        🟢 <span id="density-note">Low density — scans easily</span>
      </div>
      <br/>
      <a class="btn-download" id="download-btn" href="#" download="qrcode.png">
        ⬇ Download PNG
      </a>
    </div>
  </div>

</main>

<script>
  // ── Tab switching ──────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // ── Dropzone ──────────────────────────────────────────────────────────────
  const dropzone  = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');
  const preview   = document.getElementById('img-preview');

  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', ()=> dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setPreview(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => fileInput.files[0] && setPreview(fileInput.files[0]));

  function setPreview(file) {
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      dropzone.querySelector('.icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
    // keep file in input for FormData
    const dt = new DataTransfer();
    dt.items.add(file);
    fileInput.files = dt.files;
  }

  // ── Generate ──────────────────────────────────────────────────────────────
  const genBtn  = document.getElementById('gen-btn');
  const errBox  = document.getElementById('error-msg');
  const outCard = document.getElementById('output-card');

  genBtn.addEventListener('click', async () => {
    errBox.style.display = 'none';
    const fg = document.getElementById('fg-color').value;
    const bg = document.getElementById('bg-color').value;

    const activeTab = document.querySelector('.tab.active').dataset.tab;

    genBtn.disabled = true;
    genBtn.innerHTML = '<span class="spinner"></span>Generating…';

    try {
      let res, data;

      if (activeTab === 'text') {
        const text = document.getElementById('text-input').value.trim();
        if (!text) throw new Error('Please enter some text or a URL.');
        res  = await fetch('/generate/text', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, fg, bg })
        });
      } else {
        if (!fileInput.files[0]) throw new Error('Please upload an image first.');
        const fd = new FormData();
        fd.append('image', fileInput.files[0]);
        fd.append('fg', fg);
        fd.append('bg', bg);
        res = await fetch('/generate/image', { method: 'POST', body: fd });
      }

      data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');

      // Show result
      const qrImg = document.getElementById('qr-img');
      qrImg.src = `data:image/png;base64,${data.qr_b64}`;

      document.getElementById('encoded-display').textContent = data.encoded_data;

      // Density explanation
      const chars = data.encoded_data.length;
      const note  = document.getElementById('density-note');
      if (chars < 50)       note.textContent = `Low density (${chars} chars) — scans instantly`;
      else if (chars < 150) note.textContent = `Medium density (${chars} chars) — scans well`;
      else                  note.textContent = `High density (${chars} chars) — use good lighting`;

      // Download link
      const dlBtn = document.getElementById('download-btn');
      dlBtn.href = `data:image/png;base64,${data.qr_b64}`;

      outCard.classList.add('show');
      outCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    } catch (err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
    } finally {
      genBtn.disabled = false;
      genBtn.innerHTML = 'Generate QR Code';
    }
  });
</script>
</body>
</html>
